<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5ta Café — Próximamente</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300..500;1,300..500&family=Playfair+Display:ital,wght@0,400..500;1,400..500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="js/script.js" defer></script>
</head>
<body>

<!-- ORBITING BEANS BG -->
<div class="beans-bg">
  <div class="bean-orbit bo1"></div>
  <div class="bean-orbit bo2"></div>
  <div class="bean-orbit bo3"></div>
  <div class="bean-orbit bo4"></div>
  <div class="bean-orbit bo5"></div>
</div>

<div class="content">

  <!-- CUP ANIMATION -->
  <div class="cup-scene">
    <div class="steam-row">
      <div class="steam s1"></div>
      <div class="steam s2"></div>
      <div class="steam s3"></div>
      <div class="steam s4"></div>
    </div>
    <div style="position:relative;">
      <div class="cup-outer">
        <div class="cup-inner"><div class="cup-crema"></div></div>
        <div class="cup-handle"></div>
      </div>
    </div>
    <div class="saucer"></div>
  </div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="assets/images/logo.png" alt="5ta Café">
  </div>

  <p class="eyebrow">Guaymaca, Honduras &nbsp;·&nbsp; Productores desde 1890</p>

  <h1 class="main-title">Algo grande<br><em>está por llegar</em></h1>

  <p class="subtitle">Estamos preparando algo tan bueno como nuestro café</p>

  <!-- TYPING -->
  <div class="typing-line">
    <div class="typing-text">Sitio en construcción...</div>
    <div class="cursor"></div>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="div-line"></div>
    <div class="div-dot"></div>
    <div class="div-line right"></div>
  </div>

  <!-- INSTAGRAM BUTTON -->
  <a href="https://www.instagram.com/5tacafeoficial/" target="_blank" class="ig-btn">
    <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
    </svg>
    <span>@5tacafeoficial</span>
  </a>

</div>

<p class="copy">© 2026 5ta Café</p>

</body>
</html>
